<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="" />
		<link rel="icon" href="/public/favicon.ico" sizes="any" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Primary Meta Tags -->
		<meta
			name="description"
			content="Devlogger: Your team's logging headquarters. Track, share and learn from every event. Collaborate with your team and build a knowledge base for continuous improvement."
		/>
		<meta
			name="keywords"
			content="logging, team collaboration, knowledge base, bug tracking, event logging, team transparency"
		/>
		<meta name="author" content="Devlogger" />
		<meta name="theme-color" content="#3b82f6" />
		<meta name="robots" content="index, follow" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://devlogger.io" />
		<meta property="og:title" content="Devlogger - Your Team's Logging HQ" />
		<meta
			property="og:description"
			content="Empower your team to track, share and learn from every event. Collaborate with your team and keep everyone in sync."
		/>
		<meta property="og:image" content="https://devlogger.io/og-image.png" />
		<meta property="og:locale" content="en_US" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://devlogger.io" />
		<meta property="twitter:title" content="Devlogger - Your Team's Logging HQ" />
		<meta
			property="twitter:description"
			content="Empower your team to track, share and learn from every event. Collaborate with your team and keep everyone in sync."
		/>
		<meta property="twitter:image" content="https://devlogger.io/twitter-image.png" />
		<meta property="twitter:creator" content="@devlogger" />

		<!-- Canonical URL -->
		<link rel="canonical" href="https://devlogger.io" />

		<!-- Preconnect & DNS Prefetch for performance -->
		<link rel="preconnect" href="https://accounts.google.com" />
		<link rel="dns-prefetch" href="https://accounts.google.com" />

		<title>Devlogger - Team Logging & Collaboration Platform</title>
	</head>
	<body>
		<a href="#main" class="skip-link sr-only">Skip to main content</a>
		<div id="root"></div>
		<!-- Google Identity Services -->
		<script src="https://accounts.google.com/gsi/client" async defer></script>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
